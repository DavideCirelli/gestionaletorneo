<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Torneo</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#0b1220;
            color:white;
            padding-bottom:80px;
        }

        /* NAVBAR */
        .navbar-custom{
            background:#111827;
            border-bottom:1px solid rgba(255,255,255,0.08);
            padding:12px 16px;
        }

        .navbar-brand{
            color:#22c55e !important;
            font-weight:800;
            font-size:22px;
        }

        .nav-link{
            color:white !important;
            font-size:16px;
            padding:10px 14px !important;
            border-radius:12px;
            transition:0.2s;
        }

        .nav-link:hover{
            background:#1f2937;
        }

        /* MOBILE BOTTOM BAR */
        .bottom-nav{
            position:fixed;
            bottom:0;
            left:0;
            width:100%;
            background:#111827;
            border-top:1px solid rgba(255,255,255,0.08);
            display:flex;
            justify-content:space-around;
            padding:10px 0;
            z-index:999;
        }

        .bottom-link{
            color:white;
            text-decoration:none;
            font-size:13px;
            text-align:center;
            flex:1;
        }

        .bottom-link div{
            font-size:22px;
        }

        .bottom-link:hover{
            color:#22c55e;
        }

        @media(min-width:768px){
            .bottom-nav{
                display:none;
            }
        }
    </style>
</head>

<body>

<!-- TOP NAVBAR DESKTOP -->
<nav class="navbar navbar-expand-lg navbar-custom">

    <div class="container-fluid">

        <a class="navbar-brand" href="/">
            ⚽ Torneo Agnosine
        </a>

        <button class="navbar-toggler bg-light"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#menu">

            ☰
        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link" href="/">
                        🏠 Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/tv">
                        📺 LIVE
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="/distinta">
                        📋 Distinta
                    </a>
                </li>


                <li class="nav-item">
                    <a class="nav-link" href="/login">
                        🔑 Login
                    </a>
                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- CONTENUTO -->
{% block content %}
{% endblock %}

<!-- MOBILE NAVBAR -->
<div class="bottom-nav">

    <a href="/" class="bottom-link">
        <div>🏠</div>
        Home
    </a>

    <a href="/distinta" class="bottom-link">
        <div>📋</div>
        Distinta
    </a>

    <a href="/tv" class="bottom-link">
        <div>🔴</div>
        Live
    </a>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
